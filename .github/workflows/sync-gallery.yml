name: Sync Gallery from Google Drive

on:
  schedule:
    - cron: "0 6 * * *"  # Her gün saat 06:00'da çalışır
  workflow_dispatch:       # Manuel başlatma butonu da var

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install "gdown>=6.0"

      - name: Sync photos from Google Drive
        run: python scripts/sync_gallery.py

      - name: Commit and push new photos
        id: push
        run: |
          git config user.email "galeri-bot@cirkincoraplar.com"
          git config user.name "Galeri Bot"
          git add public/images/kadin/ public/images/erkek/ public/images/cocuk/ public/images/bez-canta/
          if git diff --staged --quiet; then
            echo "Yeni fotoğraf yok."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Galeriye yeni fotoğraflar eklendi (Google Drive)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger site deploy
        if: steps.push.outputs.changed == 'true'
        run: gh workflow run pages.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
